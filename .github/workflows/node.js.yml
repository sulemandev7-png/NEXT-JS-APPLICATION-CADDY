name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Code lo
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 - AWS Configure
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3 - ECR Login
      - name: ECR Login
        uses: aws-actions/amazon-ecr-login@v1

      # Step 4 - Frontend Build + Push
      - name: Frontend Build + Push
        run: |
          docker build -t ${{ secrets.ECR_FRONTEND_URI }}:latest ./frontend
          docker push ${{ secrets.ECR_FRONTEND_URI }}:latest

      # Step 5 - Backend Build + Push
      - name: Backend Build + Push
        run: |
          docker build -t ${{ secrets.ECR_BACKEND_URI }}:latest ./backend
          docker push ${{ secrets.ECR_BACKEND_URI }}:latest

      # Step 6 - EC2 Pe Deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/NEXT-JS-APPLICATION-CADDY
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_FRONTEND_URI }}
            docker compose pull
            docker compose up -d